[client]
port=3307
plugin-dir=D:/regi/mariadb/lib/plugin

[mysqld]
# Porta do MariaDB para evitar conflito com MySQL (padrão 3306)
port=3307

# Diretórios BASE e DADOS (Ajustados para o caminho que você confirmou)
basedir=D:/regi/mariadb
datadir=D:/regi/mariadb/data

# Configurações de Plugin (Importante para Portable)
plugin-dir=D:/regi/mariadb/lib/plugin

# Arquivo de Log de Erros (Essencial para debug)
log-error=D:/regi/mariadb/data/mariadb.err

# Configurações de Rede
bind-address=0.0.0.0

# Charset e Collation
character-set-server=utf8mb4
collation-server=utf8mb4_unicode_ci

# Configurações de Engine e SQL Mode
default-storage-engine=INNODB
sql-mode="STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION"

# Performance Básica
innodb_file_per_table=1
innodb_buffer_pool_size=256M
innodb_log_file_size=64M
max_allowed_packet=64M

# Compatibilidade Windows
lower_case_table_names=1
